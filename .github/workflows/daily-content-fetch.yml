name: Daily Content Fetch

on:
  schedule:
    - cron: '0 * * * *'   # 2:30 AM UTC = ~8:00 AM IST daily
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run content agent
        run: python scripts/fetch_and_publish.py
        env:
          # OpenRouter works from GitHub's cloud runners (Ollama on your laptop doesn't).
          # Free-tier OpenRouter models are rate-limited (~200 req/day) — plenty for this.
          # Switch to LLM_BACKEND: anthropic + ANTHROPIC_API_KEY once ready for best quality.
          LLM_BACKEND: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Commit and publish directly
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -- src/content/

          if git diff --cached --quiet; then
            echo "No new content to publish"
            exit 0
          fi

          git commit -m "content: automatic hourly update"
          git push origin master
