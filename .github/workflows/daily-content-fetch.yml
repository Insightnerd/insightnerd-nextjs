name: Daily Content Fetch

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = ~8:00 AM IST daily
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run content agent
        run: python scripts/fetch_and_publish.py
        env:
          # OpenRouter works from GitHub's cloud runners (Ollama on your laptop doesn't).
          # Free-tier OpenRouter models are rate-limited (~200 req/day) — plenty for this.
          # Switch to LLM_BACKEND: anthropic + ANTHROPIC_API_KEY once ready for best quality.
          LLM_BACKEND: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Read run summary
        id: summary
        shell: bash
        run: |
          {
            echo "body<<SUMMARY_EOF_${GITHUB_RUN_ID}"
            cat scripts/_last_run_summary.txt
            echo
            echo "SUMMARY_EOF_${GITHUB_RUN_ID}"
          } >> "$GITHUB_OUTPUT"

      - name: Open pull request with new content
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "content: daily auto-fetch $(date -u +%Y-%m-%d)"
          branch: content/daily-${{ github.run_number }}
          title: "Daily content: ${{ github.run_number }}"
          body: |
            Auto-generated by the daily content agent.

            Files changed:
            ${{ steps.summary.outputs.body }}

            Review before merging — merging to `master` triggers a Vercel deploy.
          add-paths: |
            src/content/posts/**
            src/content/.manifest.json
