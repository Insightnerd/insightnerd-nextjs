name: OpenHands Code Maintenance

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6:00 AM UTC
  workflow_dispatch:
    inputs:
      task:
        description: 'Task for OpenHands to perform'
        required: true
        default: 'Fix lint errors, update outdated npm dependencies (patch/minor only), and improve code quality'

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Python deps
        run: pip install requests

      - name: Run OpenHands Maintenance (V1 API)
        id: openhands
        shell: python
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          PROMPT: |
            You are working in the InsightNerd repository — a Next.js 16 blog/portfolio site.

            Task: ${{ inputs.task || 'Fix lint errors, update outdated npm dependencies (patch/minor only), and improve code quality' }}

            Instructions:
            - Run `npm run lint` to find and fix lint issues
            - Check for outdated deps with `npm outdated` and update safely
            - Ensure TypeScript compiles with `npx tsc --noEmit`
            - Do NOT change content in `src/content/` (posts and manifest)
            - Do NOT change the Python scripts in `scripts/`
            - Make focused, minimal changes
            - Commit each logical change separately
            - After finishing, verify with `npm run lint`
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          import json, os, sys, time
          import requests

          api_key = os.environ["OPENHANDS_API_KEY"]
          prompt = os.environ["PROMPT"]
          repo = os.environ["REPOSITORY"]
          branch = os.environ.get("BRANCH", "")
          base_url = "https://app.all-hands.dev"

          session = requests.Session()
          session.headers.update({
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json",
          })

          body = {
              "initial_message": {
                  "content": [{"type": "text", "text": prompt}]
              },
              "selected_repository": repo,
          }
          if branch:
              body["selected_branch"] = branch

          print("Creating conversation...")
          resp = session.post(f"{base_url}/api/v1/app-conversations", json=body)
          resp.raise_for_status()
          task = resp.json()
          task_id = task["id"]
          print(f"Start task: {task_id}")

          for _ in range(60):
              resp = session.get(f"{base_url}/api/v1/app-conversations/start-tasks?ids={task_id}")
              resp.raise_for_status()
              tasks = resp.json()
              t = tasks[0] if isinstance(tasks, list) else task if isinstance(tasks, dict) else task
              status = t.get("status", "")
              print(f"  Status: {status}")
              if status == "READY":
                  break
              if status == "ERROR":
                  raise RuntimeError(f"Start task failed: {t.get('detail', '')}")
              time.sleep(5)

          conv_id = t.get("app_conversation_id") or t.get("id")
          print(f"Conversation: {base_url}/conversations/{conv_id}")

          timeout = 1800
          start = time.time()
          while time.time() - start < timeout:
              resp = session.get(f"{base_url}/api/v1/app-conversations?ids={conv_id}")
              resp.raise_for_status()
              convs = resp.json()
              c = convs[0] if isinstance(convs, list) else t
              s = str(c.get("status", "")).upper()
              print(f"  Status: {s}")
              if s in ("STOPPED", "FAILED", "ERROR", "CANCELLED"):
                  break
              time.sleep(30)

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a") as f:
                  f.write(f"conversation-id={conv_id}\n")
                  f.write(f"status={s}\n")
                  f.write(f"conversation-url={base_url}/conversations/{conv_id}\n")

          if s in ("FAILED", "ERROR", "CANCELLED"):
              sys.exit(1)

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "maintenance: weekly code upkeep $(date -u +%Y-%m-%d)"
          branch: maint/weekly-${{ github.run_number }}
          title: "Weekly code maintenance: ${{ github.run_number }}"
          body: |
            Auto-generated by OpenHands maintenance workflow.

            Changes:
            - Lint fixes
            - Dependency updates
            - Code quality improvements

            Review before merging — merging to `main` triggers a GitHub Pages deploy.
